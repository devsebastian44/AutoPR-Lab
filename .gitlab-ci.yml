image: python:3.11-slim

stages:
  - lint
  - test
  - security

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - venv/

before_script:
  - python -V
  - python -m venv venv
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install -e .[dev,security]

lint:ruff:
  stage: lint
  script:
    - ruff check .
    - ruff format --check .
  allow_failure: false

test:pytest:
  stage: test
  script:
    - pytest tests/
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'

security:bandit:
  stage: security
  script:
    - bandit -r src/ -ll -ii

security:safety:
  stage: security
  script:
    - safety check --full-report
